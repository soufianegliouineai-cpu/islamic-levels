<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - الصفحة غير موجودة</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0F172A; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { text-align: center; padding: 32px; }
    .code { font-size: 72px; font-weight: 900; background: linear-gradient(135deg, #6366F1, #8B5CF6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 16px; }
    .msg { font-size: 20px; margin-bottom: 24px; }
    a.btn { display: inline-block; padding: 12px 24px; background: #8B5CF6; color: #fff; text-decoration: none; border-radius: 12px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <div class="msg">الصفحة غير موجودة</div>
    <a class="btn" href="/">العودة للصفحة الرئيسية</a>
  </div>
</body>
</html>
